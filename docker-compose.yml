services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: synxo
      POSTGRES_USER: synxo
      POSTGRES_PASSWORD: synxo
    ports:
      - "5432:5432"
    volumes:
      - synxo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synxo -d synxo"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    profiles: ["containerized"]
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/synxo
      SPRING_DATASOURCE_USERNAME: synxo
      SPRING_DATASOURCE_PASSWORD: synxo
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      APP_STORAGE_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - synxo_uploads:/app/uploads

volumes:
  synxo_postgres_data:
  synxo_uploads:
